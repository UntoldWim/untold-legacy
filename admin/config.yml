# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: UntoldWim/untold-legacy
  branch: main
  identity_url: https://auth.decapbridge.com/sites/597d2ef2-f52b-469a-a35d-11d423574cab
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://untold-legacy.com

# Geen media-uploads nodig: alleen teksten zijn bewerkbaar.
media_folder: "assets"
public_folder: "assets"

locale: "nl"

collections:
  - name: "site"
    label: "Website teksten"
    delete: false
    editor:
      preview: false
    files:
      - name: "content"
        label: "Alle teksten"
        file: "content/site.json"
        description: "Alle bewerkbare teksten van de website. Beelden en logo's staan vast in de code."
        fields:
          - label: "Intro (story)"
            name: "story"
            widget: "object"
            fields:
              - { label: "Openingszin (lead)", name: "lead", widget: "text" }
              - { label: "Alinea 1", name: "p1", widget: "text" }
              - { label: "Alinea 2", name: "p2", widget: "text" }
              - { label: "Alinea 3", name: "p3", widget: "text" }
              - { label: "Alinea 4 (slot)", name: "p4", widget: "text" }

          - label: "Purposeful Legacy"
            name: "personal"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Alinea 1", name: "p1", widget: "text" }
              - { label: "Alinea 2", name: "p2", widget: "text" }
              - { label: "Alinea 3", name: "p3", widget: "text" }
              - { label: "Pay-off (closing)", name: "closing", widget: "string" }

          - label: "Corporate Branding"
            name: "corporate"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Alinea 1", name: "p1", widget: "text" }
              - { label: "Alinea 2", name: "p2", widget: "text" }
              - { label: "Alinea 3", name: "p3", widget: "text" }
              - { label: "Pay-off (closing)", name: "closing", widget: "string" }

          - label: "Selected clients"
            name: "clients"
            widget: "object"
            fields:
              - { label: "Eyebrow-tekst", name: "eyebrow", widget: "string" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Eyebrow-tekst", name: "eyebrow", widget: "string" }
              - { label: "Titel", name: "head", widget: "string" }
              - { label: "Ondertitel", name: "sub", widget: "text" }
              - { label: "E-mailadres", name: "email", widget: "string" }
              - { label: "Telefoonnummer", name: "phone", widget: "string" }
